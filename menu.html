<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,viewport-fit=cover">
  <title>Dashboard - EmpresaFree</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="stylesheet" href="css/estilo.css">
  <link rel="manifest" href="manifest.json">
</head>
<body class="dashboard-layout">
  <!-- TOPO -->
  <header class="top-bar">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary)"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Empresa<span>Free</span>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="avatarLetra">U</div>
      <div style="display:flex; flex-direction:column; line-height:1.2;">
        <span style="font-size:0.8rem; color:var(--text-muted)">Logado como</span>
        <span id="nomeUsuario" style="font-weight:600; font-size:0.95rem;">Usuário</span>
      </div>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </header>

  <!-- MENU / DASHBOARD -->
  <main class="menu-container container animate-in">
    
    <div class="submenu-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Cadastros
    </div>
    <div class="menu-grid" style="margin-bottom: 32px;">
      <div class="menu-card glass-panel" onclick="abrir('clientes.html')">
        <div class="menu-icon">🧑‍💼</div>
        <h3>Clientes</h3>
      </div>
      <div class="menu-card glass-panel" onclick="abrir('produtos.html')">
        <div class="menu-icon">📦</div>
        <h3>Produtos</h3>
      </div>
      <div class="menu-card glass-panel" onclick="abrir('fornecedores.html')">
        <div class="menu-icon">🏢</div>
        <h3>Fornecedores</h3>
      </div>
      <div class="menu-card glass-panel" onclick="abrir('usuarios.html')">
        <div class="menu-icon">🔐</div>
        <h3>Usuários</h3>
      </div>
    </div>

    <div class="submenu-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Operações
    </div>
    <div class="menu-grid">
      <div class="menu-card glass-panel" onclick="abrir('orcamento.html')">
        <div class="menu-icon">📝</div>
        <h3>Orçamentos</h3>
      </div>
      <div class="menu-card glass-panel" onclick="abrir('vendas.html')">
        <div class="menu-icon">🛒</div>
        <h3>Vendas</h3>
      </div>
      <div class="menu-card glass-panel" onclick="abrir('financeiro.html')">
        <div class="menu-icon">💵</div>
        <h3>Financeiro</h3>
      </div>
      <div class="menu-card glass-panel" onclick="abrir('relatorios.html')">
        <div class="menu-icon">📈</div>
        <h3>Relatórios</h3>
      </div>
      <div class="menu-card glass-panel" onclick="abrir('configuracoes.html')">
        <div class="menu-icon">⚙️</div>
        <h3>Configurações</h3>
      </div>
    </div>

  </main>

  <script type="module" src="js/menu.js"></script>
  <script>
    // Configura inicial do avatar
    document.addEventListener('DOMContentLoaded', () => {
      const nomeElement = document.getElementById("nomeUsuario");
      const avatarLetra = document.getElementById("avatarLetra");
      
      setInterval(() => {
        if(nomeElement && nomeElement.innerText && nomeElement.innerText !== "Usuário") {
          avatarLetra.innerText = nomeElement.innerText.charAt(0).toUpperCase();
        }
      }, 500);
    });
  </script>
</body>
</html>
