<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>Login - EmpresaFree</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="stylesheet" href="css/estilo.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box glass-panel animate-in">
      <h2>Bem-vindo de volta</h2>
      <p class="subtitle">Acesse sua conta para continuar</p>
      
      <form id="formLogin" autocomplete="on" onsubmit="return false;">
        <div class="input-group">
          <label for="usuario">E-mail</label>
          <input type="email" id="usuario" name="usuario" placeholder="seu@email.com" required autofocus autocomplete="username">
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="button" id="btnLogin" class="btn login-btn">Entrar no Sistema</button>

        <div class="login-links">
          <a href="#">Esqueci a senha</a> &bull;
          <a href="index.html">Voltar ao Início</a>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
