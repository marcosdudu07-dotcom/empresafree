<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login - EmpresaFree</title>
  <link rel="stylesheet" href="css/estilo.css">
  <style>
    body {
      background: linear-gradient(120deg, #23272b, #0078d7 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-container {
      background: #191d22cc;
      padding: 38px 26px 30px 26px;
      border-radius: 12px;
      box-shadow: 0 4px 22px rgba(0,0,0,0.17);
      width: 100%;
      max-width: 365px;
    }
    .login-container h1 {
      text-align: center;
      margin-bottom: 28px;
      color: #fff;
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: 1.5px;
    }
    .login-container label {
      display: block;
      margin-bottom: 6px;
      color: #bfdfff;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: .3px;
    }
    .login-container input[type="email"],
    .login-container input[type="password"] {
      width: 100%;
      padding: 11px 10px;
      border-radius: 5px;
      border: 1px solid #444855;
      outline: none;
      background: #23262c;
      color: #e6ecfa;
      margin-bottom: 17px;
      font-size: 1rem;
      transition: border 0.18s;
    }
    .login-container input[type="email"]:focus,
    .login-container input[type="password"]:focus {
      border-color: #0078d7;
    }
    .login-container button {
      width: 100%;
      padding: 12px 0;
      background: #0078d7;
      color: #fff;
      font-size: 1.08rem;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.09);
      transition: background 0.18s;
      margin-top: 6px;
    }
    .login-container button:hover,
    .login-container button:focus {
      background: #005fa3;
    }
    .login-container .links {
      margin-top: 19px;
      text-align: center;
    }
    .login-container .links a {
      color: #bfdfff;
      text-decoration: underline;
      margin: 0 0.4em;
      font-size: 0.99rem;
      transition: color 0.18s;
    }
    .login-container .links a:hover,
    .login-container .links a:focus {
      color: #fff;
    }
    @media (max-width: 480px) {
      .login-container {
        max-width: 98vw;
        padding: 18px 2vw 16px 2vw;
      }
      .login-container h1 {
        font-size: 1.34rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <form id="formLogin" autocomplete="on" onsubmit="return false;">
      <h1>Entrar no Sistema</h1>

      <label for="usuario">E-mail</label>
      <input type="email" id="usuario" name="usuario" placeholder="Digite seu e-mail" required autofocus autocomplete="username">

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="Sua senha" required autocomplete="current-password">

      <button type="button" id="btnLogin">Login</button>

      <div class="links">
        <a href="#">Esqueci a senha</a> |
        <a href="index.html">Voltar</a>
      </div>
    </form>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
